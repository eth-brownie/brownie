on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: '0 12 * * *'  # Daily 1200 UTC
  workflow_dispatch:

name: evm tests

# This limits the workflow to 1 active run at any given time for a specific branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ETHERSCAN_TOKEN: 9MKURTHE8FNA9NRUUJBHMUEVY6IQ5K1EGY
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  WEB3_INFURA_PROJECT_ID: 44c6300c5e5b4b2da5fc42b06bf18a8e

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.wheel.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v6

      - name: Build wheel with mypycify
        id: wheel
        uses: BobTheBuidler/mypycify@v0.2.6
        with:
          python-version: "3.10"
          hash-key: |
            brownie/**/*.py
            pyproject.toml
            setup.py
            requirements.txt
          ccache: true
          pip-cache-dependency-path: |
            pyproject.toml
            setup.py
            requirements.txt
            requirements-dev.txt
            requirements-windows.txt

  evm:
    needs: build-wheel
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        job:
          - evm-byzantium
          - evm-petersburg
          - evm-istanbul
          - evm-berlin
          - evm-london
          - evm-paris
          - evm-shanghai
          - evm-cancun
          - evm-prague

    steps:
    - uses: actions/checkout@v6

    - name: Cache Solidity Installations
      uses: actions/cache@v5
      with:
        path: |
          ~/.solcx
          ~/.vvm
        key: ${{ runner.os }}-compiler-cache

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: stable

    - name: Use Anvil as development network
      shell: bash
      run: |
        python3 - <<'PY'
        from pathlib import Path

        path = Path("brownie/data/network-config.yaml")
        text = path.read_text()
        text = text.replace("  - name: Anvil\n    id: anvil\n", "  - name: Anvil\n    id: development\n", 1)
        text = text.replace("  - name: Ganache-CLI\n    id: development\n", "  - name: Ganache-CLI\n    id: ganache-cli\n", 1)
        path.write_text(text)
        PY

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
        cache: pip
        cache-dependency-path: |
          pyproject.toml
          setup.py
          requirements.in
          requirements.txt
          requirements-windows.in
          requirements-windows.txt
          requirements-dev.in
          requirements-dev.txt

    - name: Cache .mypy_cache
      uses: actions/cache@v5
      with:
        path: .mypy_cache
        key: mypy-cache-${{ runner.os }}-${{ hashFiles('**/*.py', 'pyproject.toml') }}

    - name: Install Tox
      run: pip install tox

    - name: Cache tox environment
      uses: actions/cache@v5
      with:
        path: .tox
        key: ${{ runner.os }}-${{ matrix.job }}-3.10-${{ matrix.architecture }}-${{ hashFiles('pyproject.toml', 'setup.py', 'requirements.in', 'requirements.txt', 'requirements-windows.in', 'requirements-windows.txt', 'requirements-dev.in', 'requirements-dev.txt', 'tox.ini') }}

    # Download the wheel artifact built by mypycify
    - name: Download wheel
      uses: actions/download-artifact@v8
      with:
        path: .
        name: ${{ needs.build-wheel.outputs.artifact-name }}

    - name: Run Tox with prebuilt wheel
      run: python -m tox run -e ${{ matrix.job }} --installpkg=$(find . -name '*.whl')

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v1
      with:
        file: ./coverage.xml
